name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate every JSON parses
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! jq empty "$f" 2>err.log; then
              echo "::error file=$f::invalid JSON"
              cat err.log
              fail=1
            fi
          done < <(find . -name '*.json' -not -path './.git/*')
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "all JSON files parse"
